version: '3.8'

services:
  agent:
    build: .
    volumes:
      - ./config:/app/config
      - ./storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    env_file: .env

  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: simmiadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  postgres_data:
